name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: stonedrum-robotics/dexterous-hand-sdk
          path: dexterous-hand-sdk
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install mkdocs-material mkdocstrings[python] mike
      - run: mkdocs gh-deploy --force
